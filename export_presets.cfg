[preset.0]

name="Dark Blue Animation Test"
platform="Windows Desktop"
runnable=true
dedicated_server=false
custom_features="darkblue-animation-test"
export_filter="resources"
export_files=PackedStringArray("res://common/actor_2d.gd", "res://common/actor_2d.tscn", "res://common/common.gd", "res://common/draw_border.gd", "res://common/edit_mode.gd", "res://common/edit_mode_draw.gd", "res://common/freemove.gd", "res://common/freemove.tscn", "res://common/guide_rect.gd", "res://common/sine_movement.gd", "res://common/spawn_test.gd", "res://common/state_machine_character_body_2d.gd", "res://darkblue/starfield/star.png", "res://darkblue/starfield/starfield_particles.gd", "res://darkblue/backdrop.png", "res://darkblue/bgblur.gdshader", "res://darkblue/encounter.gd", "res://darkblue/enemy2.png", "res://darkblue/enemy2.tscn", "res://darkblue/enemy2_e01.tscn", "res://darkblue/enemy2_e02.tscn", "res://darkblue/wave.gd", "res://darkblue/wave_test1.tscn", "res://darkblue/wave_test2.tscn")
include_filter=""
exclude_filter=""
export_path="rel/darkblue_wavetest2.exe"
patches=PackedStringArray()
patch_delta_encoding=false
patch_delta_compression_level_zstd=19
patch_delta_min_reduction=0.1
patch_delta_include_filters="*"
patch_delta_exclude_filters=""
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=1
binary_format/embed_pck=false
texture_format/s3tc_bptc=true
texture_format/etc2_astc=false
shader_baker/enabled=false
binary_format/architecture="x86_64"
codesign/enable=false
codesign/timestamp=true
codesign/timestamp_server_url=""
codesign/digest_algorithm=1
codesign/description=""
codesign/custom_options=PackedStringArray()
application/modify_resources=true
application/icon=""
application/console_wrapper_icon=""
application/icon_interpolation=4
application/file_version=""
application/product_version=""
application/company_name=""
application/product_name=""
application/file_description=""
application/copyright=""
application/trademarks=""
application/export_angle=0
application/export_d3d12=0
application/d3d12_agility_sdk_multiarch=true
ssh_remote_deploy/enabled=false
ssh_remote_deploy/host="user@host_ip"
ssh_remote_deploy/port="22"
ssh_remote_deploy/extra_args_ssh=""
ssh_remote_deploy/extra_args_scp=""
ssh_remote_deploy/run_script="Expand-Archive -LiteralPath '{temp_dir}\\{archive_name}' -DestinationPath '{temp_dir}'
$action = New-ScheduledTaskAction -Execute '{temp_dir}\\{exe_name}' -Argument '{cmd_args}'
$trigger = New-ScheduledTaskTrigger -Once -At 00:00
$settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries
$task = New-ScheduledTask -Action $action -Trigger $trigger -Settings $settings
Register-ScheduledTask godot_remote_debug -InputObject $task -Force:$true
Start-ScheduledTask -TaskName godot_remote_debug
while (Get-ScheduledTask -TaskName godot_remote_debug | ? State -eq running) { Start-Sleep -Milliseconds 100 }
Unregister-ScheduledTask -TaskName godot_remote_debug -Confirm:$false -ErrorAction:SilentlyContinue"
ssh_remote_deploy/cleanup_script="Stop-ScheduledTask -TaskName godot_remote_debug -ErrorAction:SilentlyContinue
Unregister-ScheduledTask -TaskName godot_remote_debug -Confirm:$false -ErrorAction:SilentlyContinue
Remove-Item -Recurse -Force '{temp_dir}'"
